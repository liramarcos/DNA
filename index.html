<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Data Solutions - Business Intelligence</title>
    <style>
        /* Reset de estilos e definição de fontes modernas */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f8fafc; /* Fundo levemente acinzentado para destacar o conteúdo */
            color: #1e293b;
        }

        /* Cabeçalho do site (Navbar) */
        .header-navigation {
            display: flex;
            justify-content: space-between; /* Mantém a logo na esquerda e o menu na direita */
            align-items: center;
            padding: 15px 5%;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Posicionamento Estratégico do Logotipo */
        .brand-logo {
            display: flex;
            align-items: center;
        }

        .brand-logo img {
            height: 65px; /* Altura ideal para manter o texto da logo legível */
            width: auto;
            object-fit: contain;
        }

        /* Menu de Navegação */
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 35px; /* Espaçamento elegante entre os links */
        }

        /* Links Modernos e sem sublinhado */
        .nav-link {
            text-decoration: none; /* Remove o sublinhado */
            color: #0f172a; /* Azul bem escuro, combinando com a logo */
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase; /* Deixa o menu mais corporativo */
            letter-spacing: 0.5px;
            transition: color 0.25s ease;
        }

        /* Efeito Hover utilizando o Laranja da Logo */
        .nav-link:hover {
            color: #f17300; /* Tom de laranja extraído do gráfico da logo */
        }

        /* Botão de Destaque no Menu (Call to Action) */
        .btn-contact {
            background-color: #0076a3; /* Azul intermediário extraído da logo */
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 6px;
            transition: background-color 0.25s ease;
        }

        .btn-contact:hover {
            background-color: #0f172a; /* Muda para o azul escuro no hover */
            color: #ffffff;
        }
    </style>
</head>
<body>

    <header class="header-navigation">
        <div class="brand-logo">
            <a href="#">
                <img src="logo.jpg" alt="DNA Data Solutions - Consultoria em Business Intelligence">
            </a>
        </div>
        
        <nav>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link">Home</a></li>
                <li><a href="#sobre" class="nav-link">Sobre Nós</a></li>
                <li><a href="#servicos" class="nav-link">Serviços</a></li>
                <li><a href="#cases" class="nav-link">Cases</a></li>
                <li><a href="#contato" class="nav-link btn-contact">Fale Conosco</a></li>
            </ul>
        </nav>
    </header>

</body>
</html>
