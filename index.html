<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Data Solutions | Consultoria de Dados & Business Intelligence</title>
    <style>
        /* Reset e Definições de Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-bg: #0a1128;
            --secondary-bg: #101f42;
            --accent-blue: #0077ff;
            --accent-cyan: #00f2fe;
            --text-light: #ffffff;
            --text-muted: #8fa0c4;
            --card-bg: #172a53;
            --border-color: #223e75;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Botões */
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            color: var(--text-light);
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        /* Cabeçalho / Navbar */
        header {
            background-color: rgba(10, 17, 40, 0.95);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-cyan);
        }

        /* Seção Hero */
        .hero {
            padding: 180px 0 100px 0;
            background: radial-gradient(circle at top right, rgba(0, 119, 255, 0.15), transparent 50%);
            text-align: center;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero h1 span {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto 40px auto;
        }

        /* Grid de Obras/Serviços */
        .services {
            padding: 80px 0;
            background-color: var(--secondary-bg);
        }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-title span {
            text-transform: uppercase;
            font-size: 13px;
            color: var(--accent-cyan);
            letter-spacing: 3px;
            font-weight: 700;
            display: block;
            margin-bottom: 10px;
        }

        .section-title h2 {
            font-size: 32px;
            font-weight: 700;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1max));
            gap: 30px;
        }

        .service-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            border-radius: 12px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .service-card:hover
